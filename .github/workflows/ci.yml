name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore API dependencies
        run: dotnet restore src/PropertyOps.Api/PropertyOps.Api.csproj

      - name: Restore test dependencies
        run: dotnet restore tests/PropertyOps.Api.Tests/PropertyOps.Api.Tests.csproj

      - name: Build API
        run: dotnet build src/PropertyOps.Api/PropertyOps.Api.csproj --configuration Release --no-restore

      - name: Build tests
        run: dotnet build tests/PropertyOps.Api.Tests/PropertyOps.Api.Tests.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test tests/PropertyOps.Api.Tests/PropertyOps.Api.Tests.csproj --configuration Release --no-build --verbosity normal